<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR Studios | Premium E-Commerce & Marketing Strategy</title>
    <style>
        /* --- BRAND PALETTE & CSS VARIABLES --- */
        :root {
            --bg-color: #0B1914;       /* Deep Forest Green */
            --surface-color: #12261E;  /* Structural card background */
            --text-primary: #FFFFFF;   /* Crisp White */
            --text-secondary: #A3B899; /* Muted Sage Green */
            --accent-cream: #F5EBE6;   /* Premium Warm Cream */
            --border-color: #1D3D32;   /* Subtle structural borders */
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- GLOBAL RESET & LAYOUT --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            line-height: 1.6;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        header, main, footer {
            width: 100%;
            max-width: 900px;
        }

        /* --- FIXED NAVIGATION BRANDING --- */
        header {
            padding: 3rem 0 2rem 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent-cream);
        }

        /* --- NAVIGATION TABS --- */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            width: 100%;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.6rem 1.2rem;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .tab-btn:hover {
            color: var(--accent-cream);
            border-color: var(--text-secondary);
        }

        .tab-btn.active {
            background-color: var(--accent-cream);
            color: var(--bg-color);
            border-color: var(--accent-cream);
            font-weight: 600;
        }

        /* --- TAB CONTENT PANELS --- */
        main {
            padding: 4rem 0;
            width: 100%;
        }

        .tab-panel {
            display: none; /* Hidden by default */
            width: 100%;
            animation: fadeIn 0.4s ease forwards;
        }

        .tab-panel.active {
            display: block; /* Shown only when tab active */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- IMAGE CONTAINERS --- */
        .img-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2rem; 
            margin-bottom: 2rem;
        }

        .img-container img {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        /* --- SPECIFIC UNPADDED FLUSH HOME STYLING --- */
        .img-container-flush {
            width: 100%;
            margin-bottom: 2rem;
        }

        .img-container-flush img {
            width: 100%;
            height: auto;
            display: block;
            border: none;
            border-radius: 0;
            box-shadow: none;
        }

        /* --- MINIMAL CONTACT INTERFACE --- */
        .contact-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 4rem 0;
            max-width: 600px;
            margin: 0 auto;
        }

        .contact-wrapper h2 {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 1rem;
            color: var(--accent-cream);
        }

        .contact-wrapper p {
            color: var(--text-secondary);
            margin-bottom: 3rem;
            font-size: 1.05rem;
        }

        /* --- DIRECT EMAIL ACTION BUTTON --- */
        .btn-email-direct {
            background-color: var(--accent-cream);
            color: var(--bg-color);
            border: none;
            padding: 1.2rem 3rem;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-block;
            border-radius: 2px;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-email-direct:hover {
            background-color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        /* --- FOOTER --- */
        footer {
            padding: 2rem 0 4rem 0;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: auto;
        }

        /* --- RESPONSIVE MEDIA --- */
        @media (max-width: 768px) {
            body { padding: 0 1.25rem; }
            header { padding: 2rem 0; }
            .nav-tabs { gap: 0.5rem; }
            .tab-btn { padding: 0.5rem 0.8rem; font-size: 0.75rem; }
            .contact-wrapper h2 { font-size: 1.75rem; }
            footer { flex-direction: column; align-items: flex-start; gap: 1rem; }
        }
    </style>
</head>
<body>

    <!-- PORTAL HEADER & NAVIGATION ARTERIES -->
    <header>
        <div class="logo">SR Studios</div>
        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'tab-home')">Get Started</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-services')">Services</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-brand')">Brand Architect</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-retainers')">Partnerships</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-story')">Our Story</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-contact')">Contact</button>
        </nav>
    </header>

    <!-- MAIN STRATEGIC INTERFACE CONTAINER -->
    <main>

        <!-- TAB 1: GET STARTED (HOMEPAGE - COMPLETELY FLUSH) -->
        <div id="tab-home" class="tab-panel active">
            <div class="img-container-flush">
                <img src="homepage.png" alt="SR Studios Home Overview">
            </div>
        </div>

        <!-- TAB 2: SERVICES -->
        <div id="tab-services" class="tab-panel">
            <div class="img-container">
                <img src="services1.png" alt="Core Services Tier 1">
                <img src="services2.png" alt="Core Services Tier 2">
                <img src="services3.png" alt="Core Services Tier 3">
            </div>
        </div>

        <!-- TAB 3: BRAND ARCHITECT PROGRAM -->
        <div id="tab-brand" class="tab-panel">
            <div class="img-container">
                <img src="brand1.png" alt="Brand Architect Program Part 1">
                <img src="brand2.png" alt="Brand Architect Program Part 2">
            </div>
        </div>

        <!-- TAB 4: PARTNERSHIP RETAINERS -->
        <div id="tab-retainers" class="tab-panel">
            <div class="img-container">
                <img src="retainers.png" alt="Strategic Partnership Retainers">
            </div>
        </div>

        <!-- TAB 5: OUR STORY -->
        <div id="tab-story" class="tab-panel">
            <div class="img-container">
                <img src="about.png" alt="Our Story & Background">
            </div>
        </div>

        <!-- TAB 6: CONTACT ARCHITECTURE -->
        <div id="tab-contact" class="tab-panel">
            <div class="contact-wrapper">
                <h2>Initiate Partnership</h2>
                <p>Click below to launch a direct, secure communication thread with our execution team. Please include your current metrics and preferred retainer tier parameter targets.</p>
                
                <a href="mailto:strategy@srstudiosla.com?subject=Retainer%20Brief%20-%20SR%20Studios" class="btn-email-direct">
                    Book Brand Consultation
                </a>
            </div>
        </div>

    </main>

    <!-- GLOBAL SITE FOOTER -->
    <footer>
        <div>&copy; 2026 SR Studios. All Rights Reserved.</div>
        <div>Los Angeles, California</div>
    </footer>

    <!-- INTERACTION LOGIC (LIGHTWEIGHT JAVASCRIPT) -->
    <script>
        function switchTab(event, tabId) {
            // Remove active status from all structural tab buttons
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            // Remove active status from all layout panels
            const panels = document.querySelectorAll('.tab-panel');
            panels.forEach(panel => panel.classList.remove('active'));

            // Instantiate active status to clicked target
            event.currentTarget.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            
            // Auto-scrolls window back to the top when switching sections
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>

</body>
</html>
